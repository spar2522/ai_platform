[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "aip-cli"
version = "0.1.0"
description = "CLI for managing AI Platform packages and projects"
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
]
keywords = ["cli", "ai", "platform"]

dependencies = [
    "typer>=0.16.0",
]

[project.scripts]
aip = "aip.cli:app"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
]

[tool.uv.sources]