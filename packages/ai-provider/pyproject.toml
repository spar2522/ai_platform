[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-provider"
version = "0.1.0"
description = "Provider abstraction for AI models"
requires-python = ">=3.12"

dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
]