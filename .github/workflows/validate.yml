name: Validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Environment Setup
        shell: bash
        run: |
          echo "::group::🛠️ Environment Setup"

          uv sync --all-packages

          echo "::endgroup::"

      - name: Run Tests
        shell: bash
        run: |
          echo "::group::🧪 Running Test Suite"

          uv run pytest

          echo "::endgroup::"