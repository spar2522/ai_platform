name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Repository
    runs-on: ubuntu-latest
    description: Ensures code quality by running tests and validating dependencies

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        description: Fetches the repository code for analysis

      - name: Install UV (Python Package Manager)
        uses: astral-sh/setup-uv@v5
        description: Installs the UV tool for dependency management

      - name: Set Up Python 3.12
        run: uv python install 3.12
        description: Installs the required Python version

      - name: Verify Python Version
        run: python --version
        description: Confirms the installed Python version matches requirements

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-cache-${{ hashFiles('uv.lock') }}
        description: Caches UV dependencies to speed up subsequent runs

      - name: Install Dependencies
        run: uv sync
        description: Installs project dependencies from uv.lock

      - name: Run Tests
        run: uv run pytest
        description: Executes the test suite to validate code correctness