name: Publish Package

on:
  workflow_run:
    workflows: ["Validate"]
    types:
      - completed

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      ####################################################################
      # Phase 1 - Setup
      ####################################################################

      - name: Checkout Validated Commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Workspace Dependencies
        run: uv sync --all-packages

      ####################################################################
      # Phase 2 - Determine Release Intent
      ####################################################################

      - name: Check Release Commit
        id: release
        shell: bash
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"

          echo "Commit message:"
          echo "$COMMIT_MESSAGE"

          if [[ "$COMMIT_MESSAGE" =~ (^|[[:space:]])#release$ ]]; then
            echo "Proceeding to next step for release" >> "$GITHUB_OUTPUT"
          else
            echo "NO RELEASE NEEDED" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (Not a Release)
        if: steps.release.outputs.release != 'true'
        run: echo "No #release marker found."

      ####################################################################
      # Phase 3 - Detect Changed Packages
      ####################################################################

      - name: Detect Changed Packages
        id: packages
        if: steps.release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BEFORE="${{ github.event.workflow_run.head_sha }}^"
          AFTER="${{ github.event.workflow_run.head_sha }}"

          echo "Comparing:"
          echo "$BEFORE"
          echo "$AFTER"

          PACKAGES=$(
            gh api \
              repos/${{ github.repository }}/compare/$BEFORE...$AFTER \
              --jq '.files[].filename' \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u || true
          )

          if [ -z "$PACKAGES" ]; then
            echo "No package changes detected."
            echo "packages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Packages detected:"
          echo "$PACKAGES"

          {
            echo "packages<<EOF"
            echo "$PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Skip (No Package Changes)
        if: >
          steps.release.outputs.release == 'true' &&
          steps.packages.outputs.packages == ''
        run: echo "No package changes detected."

      ####################################################################
      # Phase 4 - Publish Packages
      ####################################################################

      - name: Publish Packages
        if: >
          steps.release.outputs.release == 'true' &&
          steps.packages.outputs.packages != ''
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UV_PUBLISH_URL: https://upload.pypi.pkg.github.com/${{ github.repository_owner }}
        shell: bash
        run: |
          while read PACKAGE; do

            [ -z "$PACKAGE" ] && continue

            echo ""
            echo "======================================="
            echo "Publishing $PACKAGE"
            echo "======================================="

            cd packages/$PACKAGE

            uv build
            uv publish

            cd ../..

          done <<< "${{ steps.packages.outputs.packages }}"