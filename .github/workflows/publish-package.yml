name: Publish Package

on:
  workflow_run:
    workflows: ["Validate"]
    types:
      - completed

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      ####################################################################
      # Phase 1 - Setup
      ####################################################################

      - name: Checkout Validated Commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Workspace Dependencies
        run: uv sync --all-packages

      ####################################################################
      # Phase 2 - Determine Release Intent
      ####################################################################

      - name: Check Release Commit
        id: release
        shell: bash
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"

          echo "Commit message:"
          echo "$COMMIT_MESSAGE"

          if [[ "$COMMIT_MESSAGE" =~ (^|[[:space:]])#release$ ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (Not a Release)
        if: steps.release.outputs.release != 'true'
        run: echo "No '#release' marker found hence skipping release"

      ####################################################################
      # Phase 3 - Detect Changed Packages
      ####################################################################

      - name: Detect Changed Packages
        id: packages
        if: steps.release.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BEFORE="${{ github.event.workflow_run.head_sha }}^"
          AFTER="${{ github.event.workflow_run.head_sha }}"

          echo "Comparing:"
          echo "$BEFORE"
          echo "$AFTER"

          PACKAGES=$(
            gh api \
              repos/${{ github.repository }}/compare/$BEFORE...$AFTER \
              --jq '.files[].filename' \
            | grep '^packages/' \
            | cut -d/ -f2 \
            | sort -u || true
          )

          if [ -z "$PACKAGES" ]; then
            echo "No package changes detected."
            echo "packages=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Packages detected:"
          echo "$PACKAGES"

          {
            echo "packages<<EOF"
            echo "$PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Skip (No Package Changes)
        if: >
          steps.release.outputs.release == 'true' &&
          steps.packages.outputs.packages == ''
        run: echo "No packages found to publish"

      ####################################################################
      # Phase 4 - Temporary Version Bump
      ####################################################################

      - name: Bump Package Versions (Temporary)
        if: >
          steps.release.outputs.release == 'true' &&
          steps.packages.outputs.packages != ''
        shell: bash
        run: |
          # TEMPORARY:
          # During rapid platform development we auto-bump package versions
          # before publishing to PyPI.
          #
          # TODO:
          # Remove this step once `aip release` manages semantic versioning.
          python scripts/ci_bump_version.py ${{ steps.packages.outputs.packages }}

      ####################################################################
      # Phase 5 - Build & Publish
      ####################################################################

      - name: Publish Packages
        if: >
          steps.release.outputs.release == 'true' &&
          steps.packages.outputs.packages != ''
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        shell: bash
        run: |
          while read -r PACKAGE; do
            [ -z "$PACKAGE" ] && continue

            echo ""
            echo "======================================"
            echo "Publishing $PACKAGE"
            echo "======================================"

            rm -rf dist

            uv build --package "$PACKAGE"

            uv publish dist/*

          done <<EOF
          ${{ steps.packages.outputs.packages }}
          EOF